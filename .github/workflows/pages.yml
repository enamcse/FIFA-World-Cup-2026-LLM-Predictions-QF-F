name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The dashboard is a static page that fetches the committed data files,
      # so the "build" is just assembling the page + the data it reads.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html runlog.html _site/
          cp -r --parents data/matches.json data/actuals.json \
            results/scores/leaderboard.json results/predictions _site/
          touch _site/.nojekyll

      - name: Push to gh-pages branch
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy dashboard from ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
