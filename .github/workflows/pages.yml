name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # The dashboard is a static page that fetches the committed data files,
      # so the "build" is just assembling the page + the data it reads.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r --parents data/matches.json data/actuals.json \
            results/scores/leaderboard.json results/predictions _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
